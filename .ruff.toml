line-length = 88
indent-width = 4

target-version = "py312"

[lint]
select = ["BLE", "B", "COM", "D103", "E", "FLY", "F", "I", "PERF", "PLR", "PT", "RSE", "SIM", "S", "UP", "W", "YTT"]
# D202: Newline after doc string (Less readable)
# C416: Unnecessary Comprehension (Slower)
# COM812: Trailing Comma (Only covers single line trailing commas, seems out of place)
# FBT001: Bool positional arg
# PLR2004: Magic value used in comparison
# PTH118: Don't use os.path.join (Wants slower API used)
# SIM105: Slower exception suppression (Wants slower check used)
ignore = ["D202", "C416", "COM812", "FBT001", "PLR2004", "PTH118", "SIM105"]

[lint.extend-per-file-ignores]
# D100: Missing docstring in public module
"setup.py" = ["D100"]
# ANN201: Missing return type
# PT011: Pytest raises
# S101: Assert
"tests/*" = ["ANN201", "PT011", "S101"]

[lint.isort]
known-third-party = ["nuitka"]

[format]
quote-style = "double"
indent-style = "space"
